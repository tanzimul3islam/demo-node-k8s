apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: "11.3.5"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  values:
    initChownData:
      enabled: false
    # configuration to make dashboard configmaps discoverable
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
     
    persistence:
      enabled: true
      type: pvc
      accessModes:
        - ReadWriteOnce
      size: 4Gi

    # plugins:
    #   - grafana-strava-datasource 1.6.1
